<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Features</title>
    <style>
        :root {
            --bg: #f4f4f4;
            --card: #fff;
            --text: #222;
            --sub: #666;
        }

        body.dark {
            --bg: #121212;
            --card: #1e1e1e;
            --text: #f1f1f1;
            --sub: #aaa;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial;
        }

        body {
            background: var(--bg);
            color: var(--text);
            transition: 0.3s;
        }

        .toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 10px;
            border: none;
            background: #333;
            color: #fff;
            border-radius: 6px;
           
        }

        .features {
            display: flex;
            gap: 20px;
            padding: 60px 40px;
        }

        .card {
            flex: 1;
            background: var(--card);
            text-align: center;
            padding: 40px 20px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, .1);
           transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-8px);
        }

        .icon {
            width: 50px;
            margin-bottom: 20px;
        }

        .card p {
            color: var(--sub);
            font-size: 14px;
        }

        .highlight {
            background: linear-gradient(135deg, #c27c4c, #f2b27b);
            color: #fff;
        }

        .highlight p {
            color: #fff;
        }

        @media (max-width: 768px) {
            .features {
                flex-direction: column;
                padding: 30px;
            }
        }
    
        footer {
    width:100%;
    height:80px;
    background:#04172b;
    border-top:1px solid #8c8c8c;
    display:flex;
    justify-content:center;
    align-items:center;
}

footer p{
    color:#fff;
    font-size:14px;
    letter-spacing:0.3px;
}

@media(max-width:600px){
    footer{
        height:70px;
        padding:10px;
        text-align:center;
    }

    footer p{
        font-size:12px;
        line-height:1.5;
    }
}
    </style>
</head>
<body>
   
    <section class="features">
        <div class="card">
            <img src="https://cdn-icons-png.flaticon.com/512/854/854878.png" class="icon">
            <h2>Great Location</h2>
            <p>Lorem ipsum dolor sit amet consectetur adipisicing elit.</p>
        </div>
        <div class="card highlight">
            <img src="https://cdn-icons-png.flaticon.com/512/684/684908.png" class="icon">
            <h2>Luxury Place</h2>
            <p>Lorem ipsum dolor sit amet consectetur adipisicing elit.</p>
        </div>
        <div class="card">
            <img src="https://cdn-icons-png.flaticon.com/512/3075/3075977.png" class="icon">
            <h2>Great Food</h2>
            <p>Lorem ipsum dolor sit amet consectetur adipisicing elit.</p>
        </div>
    </section>
    <footer>
        <p>Hotel BH © 2019, All Rights Reserved</p>
    </footer>
</body>
</html>
